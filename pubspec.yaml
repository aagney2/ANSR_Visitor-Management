name: ansr_visitor_management
description: Kelsa Visitor Management - Multi-tenant visitor check-in app built on Kelsa APIs.
publish_to: 'none'
version: 1.0.2+6

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # JSON / Codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.3.4

  # Camera & Media
  image_picker: ^1.1.2

  # Signature Capture
  signature: ^5.5.0

  # UI Utilities
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  loading_animation_widget: ^1.3.0
  flutter_animate: ^4.5.2

  # Environment / Config
  flutter_dotenv: ^5.2.1

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5
  mime: ^2.0.0
  equatable: ^2.0.7
  brother_printer: ^0.2.6
  qr_flutter: ^4.1.0
  pdf: ^3.12.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/config/
    - assets/images/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"  # your 1024x1024 icon
